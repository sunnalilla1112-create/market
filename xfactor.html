<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<link rel="stylesheet" href="./main.css">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.row{
    display:flex;
    gap:10px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#218838;
}
</style>

</head>
<body>

     <div class="gradient-bg"></div>

<div class="container">
<h2>Payment</h2>

<form>
<input type="text" placeholder="Card Holder Name" required>
<input type="text" placeholder="Card Number" required>

<div class="row">
<input type="text" placeholder="MM/YY" required>
<input type="text" placeholder="CVV" required>
</div>

<button type="submit">Pay Now</button>
</form>

</div>

</body>
</html>
